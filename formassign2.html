<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Feedback Form</h1>
    <form action="/server">
        <div>
            <br>
            <label for="nam">Name</label>
            <input type="text" name="name" id="nam">
            <br><br>
            <label for="email">Email</label>
            <input type="email" name="email" id="em">
        </div>
        <br>
        Message:
        <br>
        <textarea name="fed" id="fed" rows="5" cols="50" placeholder="Enter your feedback"></textarea>
        <br>
        <button>Send your message</button>

    </form>
</body>
</html>
