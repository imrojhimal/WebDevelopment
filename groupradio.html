<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/server">
        <div>
            <input type="radio" name="fruit" id="mango" value="mango">
            <label for="mango">Mango</label>
            <input type="radio" name="fruit" id="banana" value="banana">
            <label for="banana">Banana</label>
            <input type="radio" name="fruit" id="litch" value="litche">
            <label for="litch">litche</label>
            <button>submit</button>
        </div>
        <div>
            <input type="checkbox" name="sub" id="math" value="math">
            <label for="math">Math</label>
            <input type="checkbox" name="sub" id="sci" value="science">
            <label for="sci">Science</label>
            <input type="checkbox" name="sub" id="geo" value="geo">
            <label for="geo">Geography</label>
            <button>submit</button>
        </div>
        <div>
            choose your profession
           <select name="profession" id="pro">
            
            <option> Select</option>
            <option value="stu">Student</option>
            <option value="teach">Teacher</option>
            <option value="dev">developer</option>
           </select> 
        </div>
        <div>
            <input 
            type="range" 
            id="vol"
             value="55" 
             name="volume" 
             min="0" max="100"
             step="10" >
            <label for="vol">Volume</label>
        </div>
    </form>
</body>
</html>
