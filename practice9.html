<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/server">
        <h1>Registration Form</h1>
        <div>
            <input type="text" placeholder="first name" name="name" id="first">
            <input type="text" placeholder="last name" name="name" id="last">
            <br>
            <label for="gender">Please select gender</label>
            <select name="gender" id="gender">
                <option value="male" selected>Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <div>
            Do you agree all terms an services?
            <input type="checkbox" name="term" id="term">
            <label for="term">Yes,I agree</label>
        </div>
        <button>Register</button>
    </form>
</body>
</html>
